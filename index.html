<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本船動静</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Yu Gothic UI', 'Meiryo', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }
    .header {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header h1 { font-size: 1.4rem; }
    .header .date { font-size: 0.9rem; opacity: 0.8; }
    .controls {
      padding: 1rem 2rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls input[type="text"], .controls select {
      padding: 0.5rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .controls input[type="text"] { width: 220px; }
    .controls label { font-size: 0.85rem; color: #555; cursor: pointer; }
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #1976d2; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1565c0; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #ccc; }
    .btn-danger { background: #e53935; color: white; }
    .btn-danger:hover:not(:disabled) { background: #c62828; }
    .btn-success { background: #43a047; color: white; }
    .btn-success:hover:not(:disabled) { background: #2e7d32; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }
    .btn-group { margin-left: auto; display: flex; gap: 0.5rem; }
    .summary {
      padding: 0 2rem 0.5rem;
      font-size: 0.85rem;
      color: #666;
    }
    .table-wrapper {
      padding: 0 1rem 2rem;
      overflow-x: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.78rem;
      table-layout: fixed;
    }
    thead th {
      background: #16213e;
      color: white;
      padding: 0.5rem 0.3rem;
      text-align: left;
      position: sticky;
      top: 0;
      white-space: normal;
      word-break: break-word;
      cursor: pointer;
      user-select: none;
      z-index: 10;
      font-size: 0.72rem;
      line-height: 1.25;
    }
    thead th:hover { background: #1a3a6e; }
    thead th .sort-icon { margin-left: 4px; font-size: 0.7rem; }
    thead th.no-sort, thead th:last-child { cursor: default; }
    thead th.no-sort:hover, thead th:last-child:hover { background: #16213e; }
    tbody tr { border-bottom: 1px solid #eee; }
    tbody tr:hover { background: #f5f8ff; }
    tbody tr.new-row { background: #e8f5e9; }
    tbody tr.has-alert { background: #fff8e1 !important; }
    tbody td {
      padding: 0;
      vertical-align: top;
      position: relative;
      min-height: 32px;
    }
    td .cell-display {
      padding: 0.35rem 0.3rem;
      min-height: 30px;
      cursor: text;
      width: 100%;
      display: block;
      word-break: break-word;
      white-space: normal;
    }
    /* 揚げ地 ⇔ 積み地 D&Dスワップ */
    td.swap-target { cursor: grab; }
    td.swap-target.dragging { opacity: 0.4; }
    td.swap-target.drag-over .cell-display {
      background: #fff59d !important;
      outline: 2px dashed #f57f17;
    }
    td .cell-display:hover {
      background: #e3f2fd;
      outline: 1px solid #90caf9;
    }
    td .cell-display.empty-hint { color: #ccc; }
    td .cell-display.empty-hint:hover { color: #aaa; }
    td .cell-input {
      width: 100%;
      padding: 0.4rem;
      border: 2px solid #1976d2;
      border-radius: 0;
      font-size: 0.85rem;
      font-family: inherit;
      background: #fff;
      outline: none;
      min-height: 32px;
      box-sizing: border-box;
    }
    td .cell-input:focus { box-shadow: 0 0 0 2px rgba(25,118,210,0.3); }
    select.cell-input { padding: 0.3rem; }
    .vessel-name { font-weight: 600; color: #0f3460; }
    .port { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    .port-osaka { background: #e3f2fd; color: #1565c0; }
    .port-kobe { background: #fce4ec; color: #c62828; }
    .port-other { background: #f3e5f5; color: #6a1b9a; }
    .flag-delayed { background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .flag-ok { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    .flag-alert { background: #ffebee; color: #c62828; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
    .date-changed { color: #e65100; font-weight: 600; }
    .date-alert { color: #c62828; font-weight: 700; background: #ffebee; padding: 2px 6px; border-radius: 4px; }
    .link-cell a { color: #1976d2; text-decoration: none; font-size: 0.8rem; }
    .link-cell a:hover { text-decoration: underline; }
    /* URL chip: コンパクト表示 */
    .url-chip {
      display: inline-block;
      padding: 2px 8px;
      background: #e3f2fd;
      color: #1565c0;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.75rem;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }
    .url-chip:hover { background: #1976d2; color: white; text-decoration: none; }
    .edit-url-btn {
      display: inline-block;
      padding: 2px 6px;
      margin-left: 4px;
      cursor: pointer;
      color: #999;
      font-size: 0.85rem;
      border-radius: 3px;
      vertical-align: middle;
    }
    .edit-url-btn:hover { color: #1976d2; background: #e3f2fd; }
    .source-name { font-size: 0.85rem; color: #333; vertical-align: middle; }
    .remarks { color: #666; font-size: 0.8rem; }
    .actions { white-space: nowrap; padding: 0.4rem !important; }
    .actions .btn-sm { margin: 0 2px; }
    .empty-state { text-align: center; padding: 3rem; color: #999; }
    #importFile { display: none; }
    @keyframes savedFlash {
      0% { background: #c8e6c9; }
      100% { background: transparent; }
    }
    td.just-saved .cell-display { animation: savedFlash 0.6s ease-out; }
    /* --- Modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 8px;
      width: 90%;
      max-width: 720px;
      max-height: 85vh;
      overflow: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { font-size: 1.1rem; color: #0f3460; }
    .modal-body { padding: 1.5rem; }
    .modal-body table { font-size: 0.8rem; }
    .modal-body table th { background: #f5f5f5; color: #333; padding: 0.5rem; }
    .modal-body table td { padding: 0.3rem; }
    .modal-body input[type="text"] {
      width: 100%;
      padding: 0.4rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .url-template-help {
      background: #f0f7ff;
      border: 1px solid #bbdefb;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #0d47a1;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    .url-template-help code {
      background: white;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .alert-banner {
      background: #ffebee;
      border-left: 4px solid #c62828;
      color: #b71c1c;
      padding: 0.8rem 2rem;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 0.8rem;
    }
    .alert-banner.show { display: flex; }
    .alert-banner .close-btn {
      margin-left: auto;
      cursor: pointer;
      background: none;
      border: none;
      font-size: 1rem;
      color: #b71c1c;
    }
    @media (max-width: 1200px) {
      table { font-size: 0.72rem; }
      thead th { font-size: 0.68rem; padding: 0.4rem 0.2rem; }
      td .cell-display { padding: 0.3rem 0.2rem; font-size: 0.72rem; }
      .url-chip { max-width: 90px; font-size: 0.68rem; }
    }
    @media (max-width: 768px) {
      .header { padding: 0.8rem 1rem; }
      .controls { padding: 0.5rem 1rem; }
      .table-wrapper { padding: 0 0.3rem 1rem; }
      .controls input[type="text"] { width: 100%; }
      .btn-group { margin-left: 0; width: 100%; justify-content: flex-end; }
      table { font-size: 0.65rem; }
      thead th { font-size: 0.6rem; }
      td .cell-display { font-size: 0.65rem; padding: 0.25rem 0.15rem; }
      .url-chip { max-width: 60px; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🚢 本船動静</h1>
  <div class="date" id="currentDate"></div>
</div>

<div class="alert-banner" id="alertBanner">
  <span id="alertMessage"></span>
  <button class="close-btn" onclick="closeAlertBanner()">✕</button>
</div>

<div class="controls">
  <input type="text" id="searchBox" placeholder="船名・揚げ地・備考で検索...">
  <select id="portFilter"><option value="">全揚げ地</option></select>
  <label><input type="checkbox" id="showDelayedOnly"> 遅延のみ</label>
  <label><input type="checkbox" id="showAlertOnly"> 要確認のみ</label>
  <label style="margin-left:0.5rem;">検索:
    <select id="searchEngine" style="margin-left:4px;">
      <option value="google">Google</option>
      <option value="bing">Bing (Edge)</option>
      <option value="yahoo">Yahoo! Japan</option>
    </select>
  </label>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="addNewRow()">＋ 行追加</button>
    <button class="btn btn-secondary" onclick="openCarrierModal()">船社マスタ</button>
    <button class="btn btn-secondary" onclick="exportData()">JSON出力</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">JSON取込</button>
    <input type="file" id="importFile" accept=".json" onchange="importData(event)">
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="table-wrapper">
  <table>
    <colgroup>
      <col style="width:7%"><!-- 確認先 -->
      <col style="width:7%"><!-- 結果URL -->
      <col style="width:9%"><!-- 船名 -->
      <col style="width:5%"><!-- VOY -->
      <col style="width:6%"><!-- 揚げ地 -->
      <col style="width:6%"><!-- 積み地 -->
      <col style="width:5%"><!-- 確認日 -->
      <col style="width:5%"><!-- フラグ -->
      <col style="width:5%"><!-- 入港日 -->
      <col style="width:7%"><!-- 書類入手時入港日 -->
      <col style="width:10%"><!-- 遅延理由 -->
      <col style="width:6%"><!-- S/I&I/I -->
      <col style="width:14%"><!-- 備考 -->
      <col style="width:8%"><!-- 操作 -->
    </colgroup>
    <thead>
      <tr>
        <th data-col="source">確認先<span class="sort-icon"></span></th>
        <th data-col="resultUrl">結果URL<span class="sort-icon"></span></th>
        <th data-col="vessel">船名<span class="sort-icon"></span></th>
        <th data-col="voy">VOY<span class="sort-icon"></span></th>
        <th data-col="port">揚げ地<span class="sort-icon"></span></th>
        <th data-col="origin">積み地<span class="sort-icon"></span></th>
        <th data-col="checkDate">確認日<span class="sort-icon"></span></th>
        <th class="no-sort">フラグ</th>
        <th data-col="arrival">入港日<span class="sort-icon"></span></th>
        <th data-col="originalArrival">書類入手時<br>入港日<span class="sort-icon"></span></th>
        <th data-col="delayReason">遅延理由<span class="sort-icon"></span></th>
        <th data-col="si">S/I&amp;I/I<span class="sort-icon"></span></th>
        <th data-col="remarks">備考<span class="sort-icon"></span></th>
        <th class="no-sort">操作</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Carrier Master Modal -->
<div class="modal-overlay" id="carrierModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🏢 船社マスタ（確認先URL管理）</h2>
      <button class="btn btn-sm btn-secondary" onclick="closeCarrierModal()">閉じる</button>
    </div>
    <div class="modal-body">
      <div class="url-template-help">
        URLテンプレートには以下のプレースホルダが使えます：
        <code>{vessel}</code> 船名、
        <code>{voy}</code> VOY、
        <code>{port}</code> 揚げ地、
        <code>{origin}</code> 積み地<br>
        例: <code>https://example.com/search?q={vessel}&amp;voy={voy}</code>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:30%">船社名</th>
            <th>URLテンプレート（または検索ページURL）</th>
            <th style="width:80px">操作</th>
          </tr>
        </thead>
        <tbody id="carrierTableBody"></tbody>
      </table>
      <div style="margin-top:1rem;">
        <button class="btn btn-sm btn-primary" onclick="addCarrier()">＋ 船社を追加</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" onclick="saveCarriersAndClose()">保存して閉じる</button>
    </div>
  </div>
</div>

<!-- Tavily 自動確認モーダル -->
<div class="modal-overlay" id="tavilyModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🤖 自動確認結果（Tavily）</h2>
      <button class="btn btn-sm btn-secondary" onclick="closeTavilyModal()">閉じる</button>
    </div>
    <div class="modal-body" id="tavilyModalBody">
      <p>検索中…</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeTavilyModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'vesselData';
const CARRIER_KEY = 'vesselCarriers';

const COLS = [
  { key:'source',          label:'確認先',         type:'select' },
  { key:'resultUrl',       label:'結果URL',        type:'url' },
  { key:'vessel',          label:'船名',           type:'text' },
  { key:'voy',             label:'VOY',            type:'text' },
  { key:'port',            label:'揚げ地',         type:'text' },
  { key:'origin',          label:'積み地',         type:'text' },
  { key:'checkDate',       label:'確認日',         type:'date' },
  { key:'_flag',           label:'フラグ',         type:'computed' },
  { key:'arrival',         label:'入港日',         type:'date' },
  { key:'originalArrival', label:'書類入手時入港日', type:'date' },
  { key:'delayReason',     label:'遅延理由',       type:'text' },
  { key:'si',              label:'S/I&I/I',        type:'text' },
  { key:'remarks',         label:'備考',           type:'text' },
];

const defaultCarriers = [
  { name:'ONE Vessel Schedule',   urlTemplate:'https://ecomm.one-line.com/one-ecom/schedule/vessel-schedule' },
  { name:'COSCO Vessel Schedule', urlTemplate:'https://elines.coscoshipping.com/ebusiness/sailingSchedule/searchBySchedule' },
  { name:'TOYOSHINGO / WANHAI',   urlTemplate:'https://www.toyoshingo.com/wanhai/' },
  { name:'TOYOSHINGO / HASCO',    urlTemplate:'https://www.toyoshingo.com/hasco/' },
  { name:'TOYOSHINGO / SITC',     urlTemplate:'https://www.toyoshingo.com/sitc/' },
  { name:'JINJIANG SHIPPING',     urlTemplate:'https://jinjiangshipping.jp/vmi/daily.php' },
  { name:'WAN HAI',               urlTemplate:'https://www.wanhai.com/views/quick_eservice_login.xhtml' },
];

const defaultData = [
  { id:1, source:"ONE Vessel Schedule", sourceUrl:"https://vessel-schedule-service.com/one/vessel-schedule?tab=2&voyage_detail_id=40652027", vessel:"SAMAL", voy:"2611N", port:"OSAKA", origin:"", checkDate:"2026-04-10", arrival:"2026-04-13", originalArrival:"2026-04-09", delayReason:"", eta:"", si:"", inv:"", remarks:"和信工業, オーシャントレンズ", lastCheckedArrival:"2026-04-13", lastCheckedEta:"", arrivalChanged:false },
  { id:2, source:"COSCO Vessel Schedule", sourceUrl:"", vessel:"COSCO KIKU", voy:"220E", port:"OSAKA", origin:"", checkDate:"2026-04-06", arrival:"", originalArrival:"", delayReason:"", eta:"", si:"", inv:"", remarks:"", lastCheckedArrival:"", lastCheckedEta:"", arrivalChanged:false },
  { id:3, source:"", sourceUrl:"", vessel:"JULIE", voy:"HG615A", port:"KOBE", origin:"", checkDate:"", arrival:"", originalArrival:"", delayReason:"", eta:"", si:"", inv:"", remarks:"", lastCheckedArrival:"", lastCheckedEta:"", arrivalChanged:false },
  { id:4, source:"TOYOSHINGO / WANHAI", sourceUrl:"https://www.toyoshingo.com/wanhai/certificate.php?portcode=40&id=10177739", vessel:"WAN HAI 288", voy:"N106", port:"OSAKA", origin:"", checkDate:"", arrival:"", originalArrival:"", delayReason:"", eta:"", si:"", inv:"", remarks:"三景", lastCheckedArrival:"", lastCheckedEta:"", arrivalChanged:false },
  { id:5, source:"JINJIANG SHIPPING", sourceUrl:"https://jinjiangshipping.jp/vmi/daily.php", vessel:"MILD SONATA", voy:"2615E", port:"OSAKA", origin:"", checkDate:"", arrival:"", originalArrival:"", delayReason:"", eta:"", si:"", inv:"", remarks:"", lastCheckedArrival:"", lastCheckedEta:"", arrivalChanged:false }
];

let vesselData = [];
let carriers = [];
let nextId = 1;
let activeCell = null;

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { vesselData = JSON.parse(saved); } catch { vesselData = [...defaultData]; }
  } else {
    vesselData = [...defaultData];
  }
  vesselData.forEach(row => {
    if (row.lastCheckedArrival === undefined) row.lastCheckedArrival = row.arrival || '';
    if (row.lastCheckedEta === undefined) row.lastCheckedEta = row.eta || '';
    if (row.arrivalChanged === undefined) row.arrivalChanged = false;
    if (row.resultUrl === undefined) row.resultUrl = '';
  });
  nextId = vesselData.length > 0 ? Math.max(...vesselData.map(d => d.id || 0)) + 1 : 1;
}
function saveDataStore() { localStorage.setItem(STORAGE_KEY, JSON.stringify(vesselData)); }

function loadCarriers() {
  const saved = localStorage.getItem(CARRIER_KEY);
  if (saved) {
    try { carriers = JSON.parse(saved); } catch { carriers = [...defaultCarriers]; }
  } else {
    carriers = [...defaultCarriers];
  }
}
function saveCarriers() { localStorage.setItem(CARRIER_KEY, JSON.stringify(carriers)); }

function findCarrier(name) { return carriers.find(c => c.name === name); }

function buildCheckUrl(row) {
  if (row.sourceUrl) return row.sourceUrl;
  const carrier = findCarrier(row.source);
  if (!carrier || !carrier.urlTemplate) return '';
  let url = carrier.urlTemplate;
  url = url.replace(/\{vessel\}/g, encodeURIComponent(row.vessel || ''));
  url = url.replace(/\{voy\}/g,    encodeURIComponent(row.voy || ''));
  url = url.replace(/\{port\}/g,   encodeURIComponent(row.port || ''));
  url = url.replace(/\{origin\}/g, encodeURIComponent(row.origin || ''));
  return url;
}

document.getElementById('currentDate').textContent =
  new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' });

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function portClass(port) {
  if (!port) return '';
  const p = port.toUpperCase();
  if (p === 'OSAKA') return 'port-osaka';
  if (p === 'KOBE') return 'port-kobe';
  return 'port-other';
}

function isDelayed(row) {
  if (!row.arrival || !row.originalArrival) return false;
  return new Date(row.arrival) > new Date(row.originalArrival);
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

function refreshPortFilter() {
  const pf = document.getElementById('portFilter');
  const cur = pf.value;
  const ports = [...new Set(vesselData.map(d => d.port).filter(p => p))].sort();
  pf.innerHTML = '<option value="">全揚げ地</option>';
  ports.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    if (p === cur) o.selected = true;
    pf.appendChild(o);
  });
}

function cellDisplayHTML(row, col) {
  const val = row[col.key] || '';
  if (col.key === '_flag') {
    if (row.arrivalChanged) return '<span class="flag-alert">⚠ 入港日変更</span>';
    const delayed = isDelayed(row);
    if (delayed) return '<span class="flag-delayed">遅延</span>';
    if (row.arrival) return '<span class="flag-ok">予定通り</span>';
    return '';
  }
  if (col.key === 'vessel') {
    return val ? `<span class="vessel-name">${escHtml(val)}</span>` : '';
  }
  if (col.key === 'port') {
    return val ? `<span class="port ${portClass(val)}">${escHtml(val)}</span>` : '';
  }
  if (col.key === 'source') {
    const sourceIsUrl = /^https?:\/\//i.test(val);
    const urlToShow = row.sourceUrl || (sourceIsUrl ? val : '');
    const sourceText = sourceIsUrl ? '' : val;
    let html = '';
    if (sourceText) html += `<span class="source-name">${escHtml(sourceText)}</span>`;
    if (urlToShow) {
      let host = 'URL';
      try { host = new URL(urlToShow).hostname.replace(/^www\./, ''); } catch {}
      html += (html ? ' ' : '') + `<a href="${escHtml(urlToShow)}" target="_blank" rel="noopener" class="url-chip" title="${escHtml(urlToShow)}">🔗 ${escHtml(host)}</a>`;
    }
    // ✎ 編集ボタン（URLを差し替え可能）
    html += ` <span class="edit-url-btn" onclick="event.stopPropagation(); editSourceUrl(${row.id})" title="参照URLを設定/編集">✎</span>`;
    return html;
  }
  if (col.type === 'url') {
    let html = '';
    if (val) {
      let host = 'URL';
      try { host = new URL(val).hostname.replace(/^www\./, ''); } catch {}
      html += `<a href="${escHtml(val)}" target="_blank" rel="noopener" class="url-chip" title="${escHtml(val)}">🔗 ${escHtml(host)}</a>`;
    }
    html += ` <span class="edit-url-btn" onclick="event.stopPropagation(); editUrlField(${row.id}, '${col.key}', '${escHtml(col.label)}')" title="${escHtml(col.label)}を設定/編集">✎</span>`;
    return html;
  }
  if (col.type === 'date') {
    const formatted = formatDate(val);
    if (col.key === 'arrival' && row.arrivalChanged && val) {
      return `<span class="date-alert" title="前回確認時から変更あり">${formatted}</span>`;
    }
    if (col.key === 'arrival' && row.arrival && row.originalArrival && row.arrival !== row.originalArrival) {
      return `<span class="date-changed">${formatted}</span>`;
    }
    return formatted;
  }
  return escHtml(val);
}

function startEdit(td, rowId, col) {
  if (col.type === 'computed') return;
  if (col.type === 'url') { editUrlField(rowId, col.key, col.label); return; } // URL列はプロンプト編集
  if (activeCell && activeCell.rowId === rowId && activeCell.colKey === col.key) return;
  if (activeCell) commitEdit();

  const row = vesselData.find(d => d.id === rowId);
  if (!row) return;

  activeCell = { rowId, colKey: col.key, td };
  const val = row[col.key] || '';

  let input;
  if (col.type === 'date') {
    input = document.createElement('input');
    input.type = 'date';
    input.className = 'cell-input';
    input.value = val;
  } else if (col.type === 'select' && col.key === 'source') {
    input = document.createElement('select');
    input.className = 'cell-input';
    input.innerHTML = '<option value="">（選択）</option>' +
      carriers.map(c => `<option value="${escHtml(c.name)}"${c.name === val ? ' selected' : ''}>${escHtml(c.name)}</option>`).join('');
  } else {
    input = document.createElement('input');
    input.type = 'text';
    input.className = 'cell-input';
    input.value = val;
  }

  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  if (input.tagName === 'INPUT' && input.type === 'text') input.select();

  input.addEventListener('blur', () => commitEdit());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      commitEdit();
      moveToNextRow(rowId, col);
    }
    if (e.key === 'Escape') cancelEdit();
    if (e.key === 'Tab') {
      e.preventDefault();
      commitEdit();
      moveToNextCol(rowId, col, e.shiftKey);
    }
  });
}

function commitEdit() {
  if (!activeCell) return;
  const { rowId, colKey, td } = activeCell;
  const input = td.querySelector('.cell-input');
  if (!input) { activeCell = null; return; }

  const row = vesselData.find(d => d.id === rowId);
  if (!row) { activeCell = null; return; }

  const newVal = (input.value || '').trim();
  const oldVal = row[colKey] || '';

  row[colKey] = newVal;
  activeCell = null;

  if (colKey === 'arrival' && newVal !== oldVal) {
    if (row.lastCheckedArrival && newVal && row.lastCheckedArrival !== newVal) {
      row.arrivalChanged = true;
      showAlertBanner(`「${row.vessel || '(未入力)'} ${row.voy || ''}」の入港日が変更されました: ${formatDate(row.lastCheckedArrival)} → ${formatDate(newVal)}`);
    }
  }

  const col = COLS.find(c => c.key === colKey);
  renderCell(td, row, col);

  if (newVal !== oldVal) {
    saveDataStore();
    td.classList.add('just-saved');
    setTimeout(() => td.classList.remove('just-saved'), 700);

    if (colKey === 'port') refreshPortFilter();

    const tr = td.closest('tr');
    if (colKey === 'arrival' || colKey === 'originalArrival') {
      const flagTd = tr.querySelector('[data-col="_flag"]');
      if (flagTd) {
        const flagCol = COLS.find(c => c.key === '_flag');
        renderCell(flagTd, row, flagCol);
      }
      if (colKey === 'originalArrival') {
        const arrTd = tr.querySelector('[data-col="arrival"]');
        if (arrTd && !arrTd.querySelector('.cell-input')) {
          const arrCol = COLS.find(c => c.key === 'arrival');
          renderCell(arrTd, row, arrCol);
        }
      }
      if (row.arrivalChanged) tr.classList.add('has-alert');
    }
  }
}

function cancelEdit() {
  if (!activeCell) return;
  const { rowId, colKey, td } = activeCell;
  const row = vesselData.find(d => d.id === rowId);
  activeCell = null;
  if (row) {
    const col = COLS.find(c => c.key === colKey);
    renderCell(td, row, col);
  }
}

function moveToNextRow(currentRowId, col) {
  const filtered = getFilteredData();
  const idx = filtered.findIndex(d => d.id === currentRowId);
  if (idx < 0 || idx >= filtered.length - 1) return;
  const nextRow = filtered[idx + 1];
  setTimeout(() => {
    const td = document.querySelector(`td[data-id="${nextRow.id}"][data-col="${col.key}"]`);
    if (td) startEdit(td, nextRow.id, col);
  }, 10);
}

function moveToNextCol(currentRowId, currentCol, backward) {
  const editableCols = COLS.filter(c => c.type !== 'computed');
  const idx = editableCols.findIndex(c => c.key === currentCol.key);
  const nextIdx = backward ? idx - 1 : idx + 1;
  if (nextIdx < 0 || nextIdx >= editableCols.length) return;
  const nextCol = editableCols[nextIdx];
  setTimeout(() => {
    const td = document.querySelector(`td[data-id="${currentRowId}"][data-col="${nextCol.key}"]`);
    if (td) startEdit(td, currentRowId, nextCol);
  }, 10);
}

function renderCell(td, row, col) {
  const html = cellDisplayHTML(row, col);
  const isEmpty = !(row[col.key] || '') && col.type !== 'computed';
  if (col.type === 'computed') {
    td.innerHTML = `<div class="cell-display" style="cursor:default">${html}</div>`;
  } else {
    const hint = isEmpty ? '—' : '';
    td.innerHTML = `<div class="cell-display${isEmpty ? ' empty-hint' : ''}">${html || hint}</div>`;
  }
}

let sortCol = null;
let sortAsc = true;

function getFilteredData() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const portVal = document.getElementById('portFilter').value;
  const delayedOnly = document.getElementById('showDelayedOnly').checked;
  const alertOnly = document.getElementById('showAlertOnly').checked;

  let data = vesselData.filter(row => {
    if (search && !(
      (row.vessel||'').toLowerCase().includes(search) ||
      (row.port||'').toLowerCase().includes(search) ||
      (row.remarks||'').toLowerCase().includes(search) ||
      (row.voy||'').toLowerCase().includes(search) ||
      (row.source||'').toLowerCase().includes(search)
    )) return false;
    if (portVal && row.port !== portVal) return false;
    if (delayedOnly && !isDelayed(row)) return false;
    if (alertOnly && !row.arrivalChanged) return false;
    return true;
  });

  if (sortCol) {
    data.sort((a, b) => {
      let va = a[sortCol] || '';
      let vb = b[sortCol] || '';
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }
  return data;
}

function render() {
  if (activeCell) commitEdit();

  const data = getFilteredData();
  const tbody = document.getElementById('tableBody');

  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="14" class="empty-state">該当データなし — 「＋行追加」で追加</td></tr>';
    document.getElementById('summary').textContent = '';
    return;
  }

  const alertCount = vesselData.filter(r => r.arrivalChanged).length;
  const summaryText = `${data.length}件表示 / 全${vesselData.length}件` + (alertCount > 0 ? ` ・ ⚠ ${alertCount}件が要確認` : '');
  document.getElementById('summary').textContent = summaryText;

  tbody.innerHTML = data.map(row => {
    const cells = COLS.map(col => {
      const html = cellDisplayHTML(row, col);
      const val = row[col.key] || '';
      const isEmpty = !val && col.type !== 'computed';
      if (col.type === 'computed') {
        return `<td data-id="${row.id}" data-col="${col.key}"><div class="cell-display" style="cursor:default">${html}</div></td>`;
      }
      const hint = isEmpty ? '—' : '';
      return `<td data-id="${row.id}" data-col="${col.key}"><div class="cell-display${isEmpty ? ' empty-hint' : ''}">${html || hint}</div></td>`;
    }).join('');

    const rowCls = row.arrivalChanged ? 'has-alert' : '';
    const canCheck = (row.source || row.sourceUrl) && (row.vessel || row.voy || row.port);
    const disabledAttr = canCheck ? '' : 'disabled title="船社と船名/VOY/揚げ地のどれかを入力してください"';

    const canWebSearch = row.vessel || row.voy || row.port;
    const webSearchDisabled = canWebSearch ? '' : 'disabled title="船名/VOY/揚げ地のどれかを入力"';

    return `<tr data-row-id="${row.id}" class="${rowCls}">
      ${cells}
      <td class="actions">
        <button class="btn btn-primary btn-sm" onclick="checkSite(${row.id})" ${disabledAttr}>🔍 サイト</button>
        <button class="btn btn-secondary btn-sm" onclick="webSearch(${row.id})" ${webSearchDisabled}>🌐 検索</button>
        <button class="btn btn-success btn-sm" onclick="autoCheck(${row.id})" ${webSearchDisabled}>🤖 自動</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord(${row.id})">削除</button>
      </td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('td[data-col]').forEach(td => {
    const col = COLS.find(c => c.key === td.dataset.col);
    if (!col || col.type === 'computed') return;
    td.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      startEdit(td, parseInt(td.dataset.id), col);
    });
  });

  // 揚げ地 ⇔ 積み地 ドラッグ＆ドロップで入れ替え（同じ行内のみ）
  tbody.querySelectorAll('td[data-col="port"], td[data-col="origin"]').forEach(td => {
    td.classList.add('swap-target');
    td.setAttribute('draggable', 'true');
    td.addEventListener('dragstart', (e) => {
      if (activeCell) { e.preventDefault(); return; }
      e.dataTransfer.setData('text/plain', JSON.stringify({
        rowId: parseInt(td.dataset.id),
        colKey: td.dataset.col
      }));
      e.dataTransfer.effectAllowed = 'move';
      td.classList.add('dragging');
    });
    td.addEventListener('dragend', () => td.classList.remove('dragging'));
    td.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      td.classList.add('drag-over');
    });
    td.addEventListener('dragleave', () => td.classList.remove('drag-over'));
    td.addEventListener('drop', (e) => {
      e.preventDefault();
      td.classList.remove('drag-over');
      let payload;
      try { payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
      const targetRowId = parseInt(td.dataset.id);
      const targetCol = td.dataset.col;
      if (payload.rowId !== targetRowId) return;       // 同じ行のみ
      if (payload.colKey === targetCol) return;        // 同じ列なら何もしない
      const row = vesselData.find(d => d.id === targetRowId);
      if (!row) return;
      const tmp = row.port;
      row.port = row.origin;
      row.origin = tmp;
      saveDataStore();
      refreshPortFilter();
      render();
    });
  });
}

// 船名+VOY+揚げ地でWeb検索（Google/Bing/Yahoo切替可）
function webSearch(id) {
  const row = vesselData.find(d => d.id === id);
  if (!row) return;
  const parts = [];
  if (row.vessel) parts.push(`"${row.vessel}"`);
  if (row.voy)    parts.push(row.voy);
  if (row.port)   parts.push(row.port);
  const q = parts.join(' ');
  if (!q) {
    alert('船名・VOY・揚げ地のいずれかを入力してください');
    return;
  }
  const engine = localStorage.getItem('vesselSearchEngine') || 'google';
  let url;
  if (engine === 'bing') {
    url = 'https://www.bing.com/search?q=' + encodeURIComponent(q);
  } else if (engine === 'yahoo') {
    url = 'https://search.yahoo.co.jp/search?p=' + encodeURIComponent(q);
  } else {
    url = 'https://www.google.com/search?q=' + encodeURIComponent(q);
  }
  // 確認日を更新
  row.checkDate = new Date().toISOString().slice(0, 10);
  saveDataStore();
  render();
  window.open(url, '_blank', 'noopener');
}

function checkSite(id) {
  const row = vesselData.find(d => d.id === id);
  if (!row) return;
  const url = buildCheckUrl(row);
  if (!url) {
    alert('確認先URLが設定されていません。\n\n「船社マスタ」でURLテンプレートを登録するか、\n確認先セルをダブルクリックして個別URLを設定してください。');
    return;
  }
  row.checkDate = new Date().toISOString().slice(0, 10);
  row.lastCheckedArrival = row.arrival || '';
  row.lastCheckedEta = row.eta || '';
  row.arrivalChanged = false;
  saveDataStore();
  render();
  window.open(url, '_blank', 'noopener');
}

// ===== Tavily 自動確認 =====
function escModalHtml(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

function openTavilyModal() { document.getElementById('tavilyModal').classList.add('open'); }
function closeTavilyModal() { document.getElementById('tavilyModal').classList.remove('open'); }

async function autoCheck(id) {
  const row = vesselData.find(d => d.id === id);
  if (!row) return;
  if (!(row.vessel || row.voy || row.port)) {
    alert('船名・VOY・揚げ地のいずれかを入力してください');
    return;
  }

  const body = document.getElementById('tavilyModalBody');
  body.innerHTML = `<p>🔍 <b>${escModalHtml(row.vessel)} ${escModalHtml(row.voy)}</b> を Tavily で検索中…</p>`;
  openTavilyModal();

  try {
    const resp = await fetch('/api/check-vessel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        vessel: row.vessel || '',
        voy:    row.voy || '',
        port:   row.port || '',
        origin: row.origin || '',
        source: row.source || '',
      }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      body.innerHTML = `<p style="color:#c62828;">❌ エラー: ${escModalHtml(data.error || resp.statusText)}</p>${data.hint ? `<p style="color:#666;font-size:0.85rem;">${escModalHtml(data.hint)}</p>` : ''}`;
      return;
    }

    // 確認日を更新
    row.checkDate = new Date().toISOString().slice(0, 10);
    saveDataStore();
    render();

    const answerHtml = data.answer
      ? `<div style="background:#f0f7ff;border:1px solid #bbdefb;padding:0.8rem;border-radius:6px;margin-bottom:1rem;"><b>📝 要約:</b><br>${escModalHtml(data.answer)}</div>`
      : '';

    const datesHtml = (data.dateCandidates && data.dateCandidates.length)
      ? `<div style="margin-bottom:1rem;"><b>📅 検出された日付候補:</b> ${data.dateCandidates.map(d => `<span style="background:#fff3e0;padding:2px 8px;border-radius:4px;margin:0 4px;">${escModalHtml(d)}</span>`).join('')}</div>`
      : '';

    const resultsHtml = (data.results || []).map(r => `
      <div style="border:1px solid #e0e0e0;border-radius:6px;padding:0.7rem;margin-bottom:0.6rem;">
        <div style="font-weight:600;margin-bottom:0.3rem;"><a href="${escModalHtml(r.url)}" target="_blank" rel="noopener">${escModalHtml(r.title)}</a></div>
        <div style="font-size:0.78rem;color:#666;margin-bottom:0.4rem;">${escModalHtml(r.url)}</div>
        <div style="font-size:0.85rem;line-height:1.5;">${escModalHtml(r.content)}</div>
      </div>
    `).join('');

    body.innerHTML = `
      <div style="font-size:0.8rem;color:#888;margin-bottom:0.5rem;">クエリ: <code>${escModalHtml(data.query)}</code></div>
      ${answerHtml}
      ${datesHtml}
      <h3 style="font-size:0.95rem;margin:0.8rem 0 0.5rem;">🔗 検索結果（${(data.results || []).length}件）</h3>
      ${resultsHtml || '<p>該当なし</p>'}
    `;
  } catch (err) {
    body.innerHTML = `<p style="color:#c62828;">❌ 通信エラー: ${escModalHtml(err.message || String(err))}</p>`;
  }
}

function addNewRow() {
  const newRow = { id: nextId++ };
  COLS.forEach(c => { if (c.type !== 'computed') newRow[c.key] = ''; });
  newRow.sourceUrl = '';
  newRow.checkDate = new Date().toISOString().slice(0, 10);
  newRow.lastCheckedArrival = '';
  newRow.lastCheckedEta = '';
  newRow.arrivalChanged = false;
  vesselData.unshift(newRow);  // 先頭に追加
  // 新規行を必ず先頭に見せるため、現在のソートを解除
  sortCol = null;
  document.querySelectorAll('thead th .sort-icon').forEach(s => s.textContent = '');
  saveDataStore();
  render();

  setTimeout(() => {
    const td = document.querySelector(`td[data-id="${newRow.id}"][data-col="vessel"]`);
    if (td) {
      td.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      const col = COLS.find(c => c.key === 'vessel');
      startEdit(td, newRow.id, col);
    }
  }, 50);
}

function deleteRecord(id) {
  const row = vesselData.find(d => d.id === id);
  if (!row) return;
  const name = row.vessel || '(未入力)';
  if (!confirm(`「${name} ${row.voy || ''}」を削除しますか？`)) return;
  vesselData = vesselData.filter(d => d.id !== id);
  saveDataStore();
  refreshPortFilter();
  render();
}

// 任意のURL列の設定/編集
function editUrlField(id, fieldKey, fieldLabel) {
  const row = vesselData.find(d => d.id === id);
  if (!row) return;
  const url = prompt(`${fieldLabel}を入力（空欄で削除）:`, row[fieldKey] || '');
  if (url === null) return;
  row[fieldKey] = url.trim();
  saveDataStore();
  render();
}

// 参照URLの設定/編集（✎ ボタンおよびダブルクリックから呼ばれる）
function editSourceUrl(id) {
  const row = vesselData.find(d => d.id === id);
  if (!row) return;
  // 現在のURL: sourceUrl優先、なければsourceがURLならそれ
  const current = row.sourceUrl || (/^https?:\/\//i.test(row.source || '') ? row.source : '');
  const url = prompt('参照URLを入力（空欄で削除）:\n※船社マスタのURLより優先されます', current);
  if (url === null) return;
  const trimmed = url.trim();
  row.sourceUrl = trimmed;
  // sourceフィールドがURLだった場合は空にする（船社名を改めて選べるように）
  if (/^https?:\/\//i.test(row.source || '')) {
    row.source = '';
  }
  saveDataStore();
  render();
}

document.getElementById('tableBody').addEventListener('dblclick', (e) => {
  const td = e.target.closest('td[data-col="source"]');
  if (!td) return;
  const rowId = parseInt(td.dataset.id);
  editSourceUrl(rowId);
});

function exportData() {
  const payload = { carriers, vessels: vesselData };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vessel-status_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      let vessels, newCarriers;
      if (Array.isArray(imported)) {
        vessels = imported;
      } else if (imported && Array.isArray(imported.vessels)) {
        vessels = imported.vessels;
        if (Array.isArray(imported.carriers)) newCarriers = imported.carriers;
      } else {
        throw new Error('invalid');
      }
      if (!confirm(`${vessels.length}件のデータを取り込みます。現在のデータは上書きされます。よろしいですか？`)) return;
      vesselData = vessels.map((d, i) => ({ ...d, id: d.id || i + 1 }));
      vesselData.forEach(row => {
        if (row.lastCheckedArrival === undefined) row.lastCheckedArrival = row.arrival || '';
        if (row.lastCheckedEta === undefined) row.lastCheckedEta = row.eta || '';
        if (row.arrivalChanged === undefined) row.arrivalChanged = false;
        if (row.resultUrl === undefined) row.resultUrl = '';
      });
      nextId = Math.max(...vesselData.map(d => d.id)) + 1;
      if (newCarriers) {
        carriers = newCarriers;
        saveCarriers();
      }
      saveDataStore();
      refreshPortFilter();
      render();
    } catch {
      alert('JSONファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function openCarrierModal() {
  renderCarrierTable();
  document.getElementById('carrierModal').classList.add('open');
}
function closeCarrierModal() {
  document.getElementById('carrierModal').classList.remove('open');
}
function renderCarrierTable() {
  const tbody = document.getElementById('carrierTableBody');
  tbody.innerHTML = carriers.map((c, i) => `
    <tr>
      <td><input type="text" value="${escHtml(c.name)}" data-idx="${i}" data-field="name"></td>
      <td><input type="text" value="${escHtml(c.urlTemplate || '')}" data-idx="${i}" data-field="urlTemplate" placeholder="https://... {vessel}/{voy}/{port}"></td>
      <td><button class="btn btn-sm btn-danger" onclick="removeCarrier(${i})">削除</button></td>
    </tr>
  `).join('');
  tbody.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      const field = e.target.dataset.field;
      carriers[idx][field] = e.target.value;
    });
  });
}
function addCarrier() {
  carriers.push({ name:'新規船社', urlTemplate:'' });
  renderCarrierTable();
}
function removeCarrier(idx) {
  if (!confirm(`「${carriers[idx].name}」を削除しますか？`)) return;
  carriers.splice(idx, 1);
  renderCarrierTable();
}
function saveCarriersAndClose() {
  carriers = carriers.filter(c => (c.name || '').trim());
  saveCarriers();
  closeCarrierModal();
  render();
}

function showAlertBanner(msg) {
  document.getElementById('alertMessage').textContent = '⚠ ' + msg;
  document.getElementById('alertBanner').classList.add('show');
}
function closeAlertBanner() {
  document.getElementById('alertBanner').classList.remove('show');
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('thead th .sort-icon').forEach(s => s.textContent = '');
    const icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = sortAsc ? '▲' : '▼';
    render();
  });
});

document.getElementById('searchBox').addEventListener('input', render);
document.getElementById('portFilter').addEventListener('change', render);
document.getElementById('showDelayedOnly').addEventListener('change', render);
document.getElementById('showAlertOnly').addEventListener('change', render);

// 検索エンジンの選択を永続化
const searchEngineEl = document.getElementById('searchEngine');
searchEngineEl.value = localStorage.getItem('vesselSearchEngine') || 'google';
searchEngineEl.addEventListener('change', (e) => {
  localStorage.setItem('vesselSearchEngine', e.target.value);
});

loadCarriers();
loadData();
refreshPortFilter();
render();
</script>
</body>
</html>
